version: "1"
name: "meetingbot-local"

params:
  openclaw_version:
    default: "2026.2.9"
  project_name:
    default: "workspace-meeting"
  agent_name:
    default: "loomplus-meeting"
  agent_model:
    default: "anthropic/claude-opus-4-6"
  auth_choice:
    default: "openai-api-key"
  openai_api_key:
    default: ""
  anthropic_api_key:
    default: ""
  openrouter_api_key:
    default: ""
  xai_api_key:
    default: ""
  gemini_api_key:
    default: ""
  ai_gateway_api_key:
    default: ""
  cloudflare_ai_gateway_api_key:
    default: ""
  telegram_bot_token_loomplus:
    required: true
  telegram_bot_token_scheduler:
    required: true
  loomplus_mcp_url:
    default: "https://loomplus-5rwim.ondigitalocean.app/api/mcp"
  loomplus_mcp_access_token:
    required: true
  fireflies_api_key:
    default: ""
  fireflies_user_email:
    default: ""

openclaw:
  bin: "openclaw"
  version: "${openclaw_version}"
  install: "never"
  commands:
    enable_plugin: "openclaw plugins enable telegram"
  bootstrap:
    auth_choice: "${auth_choice}"
    openai_api_key: "${openai_api_key}"
    anthropic_api_key: "${anthropic_api_key}"
    openrouter_api_key: "${openrouter_api_key}"
    xai_api_key: "${xai_api_key}"
    gemini_api_key: "${gemini_api_key}"
    ai_gateway_api_key: "${ai_gateway_api_key}"
    cloudflare_ai_gateway_api_key: "${cloudflare_ai_gateway_api_key}"
    mode: "local"
    flow: "quickstart"
    accept_risk: true
    non_interactive: true
    skip_channels: true
    skip_skills: true
    skip_health: true
    skip_ui: true
    skip_daemon: true

workspaces:
  - name: "${project_name}"
    assets: "./assets"

agents:
  - workspace: "${project_name}"
    name: "${agent_name}"
    model: "${agent_model}"

files:
  - workspace: "${project_name}"
    path: "config/mcporter.json"
    overwrite: true
    content: |
      {
        "mcpServers": {
          "loomplus": {
            "description": "LoomPlus MCP",
            "url": "${loomplus_mcp_url}?accessToken=${loomplus_mcp_access_token}"
          }
        }
      }

  - workspace: "${project_name}"
    path: "config/fireflies.json"
    overwrite: true
    content: |
      {
        "apiKey": "${fireflies_api_key}",
        "userEmail": "${fireflies_user_email}"
      }

  - workspace: "${project_name}"
    path: "skills/meeting-scheduler/scripts/start-scheduling-server.sh"
    overwrite: true
    content: |
      #!/bin/bash
      # Start the scheduling callback server
      # Fill in your actual bot tokens before use
      export SCHEDULER_BOT_TOKEN="${telegram_bot_token_scheduler}"
      export LOOMPLUS_BOT_TOKEN="${telegram_bot_token_loomplus}"
      exec node "$(dirname "$0")/scheduling-callback-server.mjs"

channels:
  - channel: "telegram"
    account: "loomplus"
    token: "${telegram_bot_token_loomplus}"
